<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Craft Panel</title>
    <link rel="stylesheet" href="globals.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="craft">
    <div class="container">
        <nav class="navbar">
            <div class="player-info card">
                <img class="player-photo"/>
                <div class="welcome-group">
                    <span class="welcome-text" data-localize="welcome_text">Welcome</span>
                    <h2 class="player-name">Alberto</h2>
                </div>
                <div class="job-group">
                    <span class="player-job">Pond Cafe</span>
                </div>
            </div>

            <div class="navigation-buttons">
                <button class="nav-button active" data-type="all">
                    <img class="icon" src="assets/svg/all.svg" alt="All"/>
                    <span class="text" data-localize="nav_all">All</span>
                </button>
                <button class="nav-button" data-type="food">
                    <img class="icon" src="assets/svg/foods.svg" alt="Foods"/>
                    <span class="text" data-localize="nav_foods">Foods</span>
                </button>
                <button class="nav-button" data-type="desserts">
                    <img class="icon" src="assets/svg/desserts.svg" alt="Desserts"/>
                    <span class="text" data-localize="nav_desserts">Desserts</span>
                </button>
                <button class="nav-button" data-type="drinks">
                    <img class="icon" src="assets/svg/drinks.svg" alt="Drinks"/>
                    <span class="text" data-localize="nav_drinks">Drinks</span>
                </button>
            </div>
            <button class="exit-button nav-button" data-type="exit">
                <img class="icon" src="assets/svg/exit.svg" alt="Exit"/>
                <span class="text" data-localize="nav_exit">Exit</span>
            </button>
        </nav>

        <main class="main-panel">
            <header class="main-header">
                <div class="craft-panel-text" data-localize="product_list_title">Product List</div>
                <div class="search-group">
                    <div class="search-wrapper">
                        <img class="search-icon" src="assets/svg/search.svg" alt="Search"/>
                        <input
                                type="text"
                                id="search-input"
                                placeholder="Search..."
                                class="search-input"
                                data-localize-placeholder="search_placeholder"
                        />
                    </div>
                </div>
            </header>
            <section class="craft-actions"></section>
        </main>
    </div>
</div>

<div class="craft-menu-overlay">
    <div class="craft-menu">
        <div class="craft-menu-content">
            <img class="craft-icon" src="assets/images/drink-item.png"/>
            <div class="craft-name">
                <span class="craft-name-text" data-localize="craft_item_name">Coffee</span>
                <hr class="line"/>
            </div>
            <div class="ingredients-list"></div>
            <div class="count-selector">
                <button class="count-button reduce-button">
                    <img src="assets/svg/reduce.svg" alt="Reduce"/>
                </button>
                <div class="count-counter">
                    <span class="count">1</span>
                </div>
                <button class="count-button increase-button">
                    <img src="assets/svg/increase.svg" alt="Increase"/>
                </button>
            </div>
            <button class="craft-button-action">
                <span data-localize="craft_button_text">Craft</span>
            </button>
        </div>
    </div>
</div>

<div class="drink-craft">
    <div class="overlap-group">
        <img class="craft-item main" id="empty" src="assets/images/empty-shaker.png"/>
        <img class="craft-item small" id="item1" style="top: 422px; left: 318px;" src="assets/images/drink-item.png"/>
        <img class="craft-item small" id="item2" style="top: 274px; left: 83px;" src="assets/images/drink-item.png"/>
        <img class="craft-item small" id="item3" style="top: 392px; left: 158px;" src="assets/images/drink-item.png"/>
        <img class="craft-item main" id="full" src="assets/images/full-shaker.png"/>
    </div>
</div>

<div class="dessert-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group2">
            <div class="cake-craft-item empty" id="empty-plate"></div>
            <img class="cake-craft-item full" id="full-cake" src="assets/images/full-cake.png"/>
            <img class="cake-craft-item small" id="item1" src="assets/images/cake-item.png"/>
        </div>
    </div>
</div>

<div class="food-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group3">
            <img class="food-pan" id="food-pan" src="assets/images/food-pan.png"/>
            <img class="food-spoon" id="food-spoon" src="assets/images/food-spoon.png"/>
        </div>
    </div>
</div>

<div class="sandwich-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group4">
            <img class="sandwich-bread-top" id="sandwich-bread-top" src="assets/images/sandwich-bread-top.png"/>
            <img class="sandwich-bread-bottom" id="sandwich-bread-bottom"
                 src="assets/images/sandwich-bread-bottom.png"/>
            <img class="sandwich-lettuce" id="sandwich-lettuce" src="assets/images/sandwich-lettuce.png"/>
            <img class="sandwich-tomato" id="sandwich-tomato" src="assets/images/sandwich-tomato.png"/>
            <img class="sandwich-cheese" id="sandwich-cheese" src="assets/images/sandwich-cheese.png"/>
        </div>
    </div>
</div>

<div class="shake-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group5">
            <img class="shake-cream" id="shake-cream" src="assets/images/shake-cream.png"/>
            <img class="shake-empty" id="shake-empty" src="assets/images/shake-empty.png"/>
            <img class="shake-full" id="shake-full" src="assets/images/shake-full.png"/>
        </div>
    </div>
</div>

<div class="pizza-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group6">
            <img class="pizza-full" id="pizza-full" src="assets/images/pizza-full.png"/>
            <img class="pizza-slicer" id="pizza-slicer" src="assets/images/pizza-slicer.png"/>
            <img class="pizza-cut-layer" id="cut-layer-1" src="assets/images/pizza-sliced.png"/>
            <img class="pizza-cut-layer" id="cut-layer-2" src="assets/images/pizza-sliced.png"/>
            <img class="pizza-cut-layer" id="cut-layer-3" src="assets/images/pizza-sliced.png"/>
            <img class="pizza-cut-layer" id="cut-layer-4" src="assets/images/pizza-sliced.png"/>
            <div id="debug-point"></div>
        </div>
    </div>
</div>

<div class="coffee-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group7">
            <img class="coffee-full" id="coffee-full" src="assets/images/coffee-full.png"/>
            <img class="coffee-empty" id="coffee-empty" src="assets/images/coffee-empty.png"/>
            <img class="coffee-pot" id="coffee-pot" src="assets/images/coffee-pot.png"/>
            <div id="coffee-debug-point"></div>
        </div>
    </div>
</div>

<div class="muffin-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group8">
            <img class="muffin-raw" id="muffin-raw" src="assets/images/muffin-raw.png"/>
            <img class="muffin-furnace" id="muffin-furnace" src="assets/images/muffin-furnace.png"/>
            <img class="muffin-furnace-closed" id="muffin-furnace-closed"
                 src="assets/images/muffin-furnace-closed.png"/>
            <img class="muffin-baked" id="muffin-baked" src="assets/images/muffin-baked.png"/>
            <img class="muffin-furnace-baked" id="muffin-furnace-baked" src="assets/images/muffin-furnace-baked.png"/>
        </div>
    </div>
</div>

<div class="ice-cream-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group9">
            <img class="ice-cream-machine" id="ice-cream-machine" src="assets/images/iceCream-Machine.png"/>
            <img class="ice-cream-empty" id="ice-cream-empty" src="assets/images/iceCream-empty.png"/>
            <img class="ice-cream-full" id="ice-cream-full" src="assets/images/iceCream-full.png"/>
        </div>
    </div>
</div>

<div class="burger-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group10">
            <img class="burger-grill" id="burger-grill" src="assets/images/burger-grill.png"/>
            <img class="burger-meat-raw" id="burger-meat-raw" src="assets/images/burger-meat-raw.png"/>
            <img class="burger-meat-baked" id="burger-meat-baked" src="assets/images/burger-meat-baked.png"/>
            <img class="burger-bun-bottom" id="burger-bun-bottom" src="assets/images/burger-bun-bottom.png"/>
            <img class="burger-item burger-cheese" id="burger-cheese" src="assets/images/burger-cheese.png"/>
            <img class="burger-item burger-lettuce" id="burger-lettuce" src="assets/images/burger-lettuce.png"/>
            <img class="burger-item burger-tomato" id="burger-tomato" src="assets/images/burger-tomato.png"/>
            <img class="burger-item burger-bun-top" id="burger-bun-top" src="assets/images/burger-bun-top.png"/>
        </div>
    </div>
</div>

<div class="fries-craft">
    <div class="overlap-group-wrapper">
        <div class="overlap-group11">
            <img class="fryer-machine" id="fryer-machine1" src="assets/images/fries-fryer1.png"/>
            <img class="fries-basket" id="fries-raw1" src="assets/images/fries-raw1.png"/>
            <img class="fries-basket" id="fries-raw2" src="assets/images/fries-raw2.png"/>
            <img class="fries-basket" id="fries-baked1" src="assets/images/fries-baked1.png"/>
            <img class="fries-basket" id="fries-baked2" src="assets/images/fries-baked2.png"/>
            <img class="fryer-machine" id="fryer-machine2" src="assets/images/fries-fryer2.png"/>
        </div>
    </div>
</div>

<div id="notify" class="notify">
    <button class="close-btn" aria-label="Close notification">×</button>
    <div class="notify-message" data-localize="notification_message">Bildirim mesajınız burada olacak</div>
</div>

<script type="module" src="script.js"></script>
<script type="module" src="locales.js"></script>
</body>
</html>
